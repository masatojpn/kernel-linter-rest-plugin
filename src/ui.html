<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Kernel Linter REST</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font:
          12px/1.5 Inter,
          system-ui,
          sans-serif;
        color: var(--figma-color-text);
        background: var(--figma-color-bg);
      }

      .wrap {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .label {
        font-weight: 600;
      }

      .input {
        width: 100%;
        min-height: 32px;
        padding: 8px 10px;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        outline: none;
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
      }

      .button {
        appearance: none;
        border: 0;
        border-radius: 6px;
        min-height: 36px;
        padding: 0 12px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        background: var(--figma-color-bg-brand);
      }

      .button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .panel {
        border: 1px solid var(--figma-color-border);
        border-radius: 8px;
        padding: 10px;
        background: var(--figma-color-bg-secondary);
      }

      .status {
        white-space: pre-wrap;
      }

      .error {
        color: var(--figma-color-text-danger);
      }

      .result {
        white-space: pre-wrap;
      }

      .source-list {
        display: grid;
        gap: 8px;
      }

      .source-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .source-item input[type="checkbox"] {
        margin: 0;
      }

      .source-item-label {
        line-height: 1.4;
      }

      html,
      body {
        height: 100%;
      }

      body {
        padding: 12px;
        overflow: hidden;
      }

      .app {
        height: 100%;
      }

      .main {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .hero-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .button-large {
        min-height: 44px;
      }

      .button-secondary {
        color: var(--figma-color-text);
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
      }

      .panel-compact {
        padding: 12px;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: body;
        z-index: 10;
        opacity: 0;
        pointer-events: none;
      }

      .modal.is-open {
        opacity: 1;
        pointer-events: all;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgb(0 0 0 / 0.32);
      }

      .modal.is-open > .modal-backdrop {
        opacity: 1;
      }

      .modal-dialog {
        position: absolute;
        inset: 12px;
        display: grid;
        grid-template-rows: auto 1fr;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        background: var(--figma-color-bg);
        overflow: hidden;
        transition: all 0.2s cubic-bezier(0.165, 0, 0, 1.65);
        transform: scale(0.8);
      }

      .modal.is-open > .modal-dialog {
        transform: scale(1);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border-bottom: 1px solid var(--figma-color-border);
        background: var(--figma-color-bg-secondary);
      }

      .modal-title-wrap {
        display: grid;
        gap: 2px;
      }

      .modal-title {
        font-size: 13px;
        font-weight: 700;
      }

      .modal-subtitle {
        font-size: 11px;
        color: var(--figma-color-text-secondary);
      }

      .modal-body {
        display: grid;
        gap: 12px;
        padding: 12px;
        overflow: auto;
      }

      .icon-button {
        appearance: none;
        width: 28px;
        height: 28px;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
        cursor: pointer;
      }

      .header {
        position: absolute;
      }

      .header-inner {
        display: flex;
        width: 100%;
      }
      .wrapper {
        padding-top: 32px;
        overflow-y: scroll;
      }
    </style>
  </head>
  <body>
  <div class="app">
    <div class="main">
      <div class="header">
        <div class="header-inner">
          <button id="runButton" type="button" class="button" style="width: 100%; display: block;">
            <span style="width: 100%; display:block;">実行</span>
          </button>
          <button id="openSettingsButton" type="button" class="button" style="background: transparent; border: none; margin-left: auto;">
            <span style="background: transparent;">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">

              </svg>
            </span>
          </button>
        </div>
      </div>
      <div class="wrapper">
        <div class="panel panel-compact">
          <div class="label">Status</div>
          <div id="status" class="status">待機中</div>
        </div>

        <div class="panel panel-compact">
          <div class="label">Result</div>
          <div id="result" class="result">結果なし</div>
        </div>
      </div>
      <div class="status-bar">
        <div id="connectionStatus" class="status">Not connected</div>
      </div>
    </div>

    <div id="settingsModal" class="modal" aria-hidden="true">
      <div id="settingsBackdrop" class="modal-backdrop"></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settingsTitle"
      >
        <div class="modal-header">
          <div class="modal-title-wrap">
            <div id="settingsTitle" class="modal-title">Settings</div>
            <div class="modal-subtitle">Source / Connect / Setup</div>
          </div>

          <button
            id="closeSettingsButton"
            class="icon-button"
            type="button"
            aria-label="Close settings"
          >
            ×
          </button>
        </div>

        <div class="modal-body">
          <div class="field">
            <button id="connectButton" class="button" type="button">Figmaアカウントを接続</button>
          </div>
          <p>有効化済みライブラリを参照する場合は接続してください。</p>

          <button id="setupPagesButton" class="button button-secondary" type="button">
            ページ生成
          </button>
          <p>
            現在のファイルにプラグイン用ページを生成します。<br>
            ※外部ライブラリを参照する場合は、ライブラリ側でページ生成を行なってください。
          </p>

          <hr width="100%" height="1px">

          <p>参照ライブラリ設定</p>
          <div class="panel">
            <div class="label">Global Sources</div>
            <div id="globalSources" class="result">なし</div>
          </div>

          <div class="panel">
            <div class="label">Project Sources</div>
            <div id="projectSources" class="result">なし</div>
          </div>

          <div class="panel">
            <div class="label">Global Sourceを選択</div>
            <div id="globalSourceCandidates" class="result">候補なし</div>
          </div>

          <div class="panel">
            <div class="label">Project Sourceを選択</div>
            <div id="projectSourceCandidates" class="result">候補なし</div>
          </div>

          <button id="saveSourcesButton" class="button" type="button">
            設定を保存
          </button>
        </div>
      </div>
    </div>

    <script>

      const openSettingsButtonEl = document.getElementById("openSettingsButton");
      const closeSettingsButtonEl = document.getElementById("closeSettingsButton");
      const settingsModalEl = document.getElementById("settingsModal");
      const settingsBackdropEl = document.getElementById("settingsBackdrop");

      const FIXED_SERVER_BASE_URL =
        "https://kernel-linter-rest-server.vercel.app";
      const globalSourcesEl = document.getElementById("globalSources");
      const projectSourcesEl = document.getElementById("projectSources");
      const globalSourceCandidatesEl = document.getElementById(
        "globalSourceCandidates",
      );
      const projectSourceCandidatesEl = document.getElementById(
        "projectSourceCandidates",
      );
      const runButtonEl = document.getElementById("runButton");
      const connectButtonEl = document.getElementById("connectButton");
      const setupPagesButtonEl = document.getElementById("setupPagesButton");
      const connectionStatusEl = document.getElementById("connectionStatus");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const saveSourcesButtonEl = document.getElementById("saveSourcesButton");

      const POLL_INTERVAL_MS = 1500;
      const POLL_TIMEOUT_MS = 60000;

      const TEST_PAGE_NAME = "__test";
      const ALLOWED_PAGE_NAME = "__allowedComponentList";
      let connectPollTimerId = 0;
      let connectDeadlineAt = 0;
      let activeConnectRequestId = "";
      let isConnecting = false;
      let currentCandidates = [];
      let sessionToken = "";
      let pluginAccess = null;

      function openSettingsModal() {
        settingsModalEl.classList.add("is-open");
        settingsModalEl.setAttribute("aria-hidden", "false");
      }

      function closeSettingsModal() {
        settingsModalEl.classList.remove("is-open");
        settingsModalEl.setAttribute("aria-hidden", "true");
      }

      function setStatus(message, isError) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", !!isError);
      }

      function getSourceLabelByFileKey(fileKey) {
        if (!fileKey) {
          return "";
        }

        if (!Array.isArray(currentCandidates)) {
          return fileKey;
        }

        for (var i = 0; i < currentCandidates.length; i += 1) {
          var candidate = currentCandidates[i];

          if (!candidate || typeof candidate !== "object") {
            continue;
          }

          if (candidate.fileKey === fileKey) {
            if (typeof candidate.label === "string" && candidate.label !== "") {
              return candidate.label;
            }

            break;
          }
        }

        return fileKey;
      }

      function formatSources(sources) {
        if (!Array.isArray(sources) || sources.length === 0) {
          return "なし";
        }

        return sources
          .map(function (source, index) {
            var fileKey =
              source && typeof source.fileKey === "string"
                ? source.fileKey
                : "";

            var pageName =
              source && typeof source.pageName === "string"
                ? source.pageName
                : "";

            var label = getSourceLabelByFileKey(fileKey);

            return String(index + 1) + ". " + label;
          })
          .join("\n");
      }

      function collectCheckedSources(groupName) {
        var checkedEls = document.querySelectorAll(
          'input[name="' + groupName + '"]:checked',
        );

        var result = [];

        for (var i = 0; i < checkedEls.length; i += 1) {
          var el = checkedEls[i];
          var fileKey = el.dataset.fileKey;

          if (!fileKey) {
            continue;
          }

          result.push({
            fileKey: fileKey,
            pageName: "__allowedComponentList",
          });
        }

        return result;
      }

      function updateRunLintAvailability(config) {
        var globalSources =
          config && Array.isArray(config.globalSources)
            ? config.globalSources
            : [];

        var projectSources =
          config && Array.isArray(config.projectSources)
            ? config.projectSources
            : [];

        var totalSourceCount = globalSources.length + projectSources.length;

        runButtonEl.disabled = false;
      }

      function renderSources(config) {
        var globalSources =
          config && Array.isArray(config.globalSources)
            ? config.globalSources
            : [];

        var projectSources =
          config && Array.isArray(config.projectSources)
            ? config.projectSources
            : [];

        globalSourcesEl.textContent = formatSources(globalSources);
        projectSourcesEl.textContent = formatSources(projectSources);
      }

      function isSourceChecked(sources, candidate) {
        if (!Array.isArray(sources)) {
          return false;
        }

        for (var i = 0; i < sources.length; i += 1) {
          var source = sources[i];

          if (!source || typeof source !== "object") {
            continue;
          }

          if (
            source.fileKey === candidate.fileKey &&
            source.pageName === "__allowedComponentList"
          ) {
            return true;
          }
        }

        return false;
      }

      function createCandidateCheckbox(candidate, checked, groupName) {
        var wrapper = document.createElement("label");
        wrapper.className = "source-item";

        var checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.name = groupName;
        checkbox.value = candidate.fileKey;
        checkbox.checked = checked;
        checkbox.dataset.fileKey = candidate.fileKey;
        checkbox.dataset.label = candidate.label;

        var text = document.createElement("span");
        text.className = "source-item-label";
        text.textContent = candidate.label;

        wrapper.appendChild(checkbox);
        wrapper.appendChild(text);

        return wrapper;
      }

      function renderCandidateList(
        container,
        candidates,
        selectedSources,
        groupName,
      ) {
        container.innerHTML = "";

        if (!Array.isArray(candidates) || candidates.length === 0) {
          container.textContent = "候補なし";
          return;
        }

        var list = document.createElement("div");
        list.className = "source-list";

        for (var i = 0; i < candidates.length; i += 1) {
          var candidate = candidates[i];
          var checked = isSourceChecked(selectedSources, candidate);

          list.appendChild(
            createCandidateCheckbox(candidate, checked, groupName),
          );
        }

        container.appendChild(list);
      }

      function renderSourceSelectors(config, candidates) {
        var globalSources =
          config && Array.isArray(config.globalSources)
            ? config.globalSources
            : [];

        var projectSources =
          config && Array.isArray(config.projectSources)
            ? config.projectSources
            : [];

        renderCandidateList(
          globalSourceCandidatesEl,
          candidates,
          globalSources,
          "global-source-candidate",
        );

        renderCandidateList(
          projectSourceCandidatesEl,
          candidates,
          projectSources,
          "project-source-candidate",
        );

        updateSourceControlsDisabled();
      }

      function setRunning(isRunning) {
        runButtonEl.disabled = !!isRunning;
      }

      function setConnecting(connecting) {
        isConnecting = !!connecting;
        connectButtonEl.disabled = !!connecting;
      }

      function getServerBaseUrl() {
        return normalizeBaseUrl(FIXED_SERVER_BASE_URL);
      }

      function normalizeBaseUrl(value) {
        return String(value).trim().replace(/\/+$/, "");
      }

      function sendToPlugin(message) {
        console.log("[ui -> plugin]", message);

        parent.postMessage(
          {
            pluginMessage: message,
          },
          "*",
        );
      }

      function createRequestId() {
        const randomPart = Math.random().toString(36).slice(2);
        const timePart = String(Date.now());
        return "connect-" + timePart + "-" + randomPart;
      }

      function clearConnectPolling() {
        if (connectPollTimerId) {
          clearTimeout(connectPollTimerId);
          connectPollTimerId = 0;
        }
      }

      function finishConnectWithError(message) {
        clearConnectPolling();
        setConnecting(false);
        setStatus(message, true);
      }

      function finishConnectWaiting(message) {
        clearConnectPolling();
        setConnecting(false);
        setStatus(message, false);
      }

      function canUseProFeatures() {
        if (!pluginAccess) {
          return false;
        }

        if (pluginAccess.canUsePro === true) {
          return true;
        }

        return false;
      }

      function updateSourceControlsDisabled() {
        var disabled = canUseProFeatures() !== true;

        var globalCheckboxes = document.querySelectorAll(
          'input[name="global-source-candidate"]',
        );
        var projectCheckboxes = document.querySelectorAll(
          'input[name="project-source-candidate"]',
        );

        for (var i = 0; i < globalCheckboxes.length; i += 1) {
          globalCheckboxes[i].disabled = disabled;
        }

        for (var j = 0; j < projectCheckboxes.length; j += 1) {
          projectCheckboxes[j].disabled = disabled;
        }

        saveSourcesButtonEl.disabled = disabled;
      }

      async function refreshPluginAccess() {
        if (!sessionToken) {
          console.log("[ui] refreshPluginAccess: no sessionToken");
          pluginAccess = null;
          updateSourceControlsDisabled();
          return;
        }

        try {
          var access = await fetchPluginAccess();
          console.log("[ui] refreshPluginAccess success", access);
        } catch (error) {
          console.log("[ui] refreshPluginAccess error", error);
          pluginAccess = null;
        }

        updateSourceControlsDisabled();
      }

      async function pollConnectResult(baseUrl, requestId) {
        if (!isConnecting) {
          return;
        }

        if (requestId !== activeConnectRequestId) {
          return;
        }

        if (Date.now() >= connectDeadlineAt) {
          finishConnectWithError(
            "接続がタイムアウトしました。もう一度 Connect を押してください。",
          );
          return;
        }

        const pollUrl =
          baseUrl + "/api/auth/poll?requestId=" + encodeURIComponent(requestId);

        console.log("[ui] polling", {
          requestId: requestId,
          pollUrl: pollUrl,
        });

        try {
          const response = await fetch(pollUrl, {
            method: "GET",
            cache: "no-store",
          });

          const data = await response.json();

          console.log("[ui] poll result", data);

          if (!response.ok) {
            finishConnectWithError("接続確認に失敗しました。");
            return;
          }

          if (data.pending) {
            setStatus("OAuth 完了待ちです...", false);

            connectPollTimerId = window.setTimeout(function () {
              pollConnectResult(baseUrl, requestId);
            }, POLL_INTERVAL_MS);

            return;
          }

          if (!data.sessionToken) {
            finishConnectWithError("sessionToken を取得できませんでした。");
            return;
          }

          sessionToken = data.sessionToken;

          sendToPlugin({
            type: "save-session-token",
            serverBaseUrl: baseUrl,
            sessionToken: data.sessionToken,
          });

          console.log(data.sessionToken);

          refreshPluginAccess();

          finishConnectWaiting("OAuth 完了。sessionToken を保存しています...");
        } catch (error) {
          console.log("[ui] poll error", error);

          connectPollTimerId = window.setTimeout(function () {
            pollConnectResult(baseUrl, requestId);
          }, POLL_INTERVAL_MS);
        }
      }

      async function fetchPluginAccess() {
        var baseUrl = getServerBaseUrl();

        if (!baseUrl) {
          throw new Error("serverBaseUrl is empty");
        }

        if (!sessionToken || sessionToken.trim() === "") {
          throw new Error("sessionToken is empty");
        }

        const url =
          baseUrl +
          "/api/plugin/access?sessionToken=" +
          encodeURIComponent(sessionToken);

        const response = await fetch(url, {
          method: "GET",
        });

        const json = await response.json();

        if (!response.ok) {
          const message =
            json && json.error && typeof json.error.message === "string"
              ? json.error.message
              : "Failed to fetch plugin access";

          throw new Error(message);
        }

        if (!json || json.ok !== true || !json.data) {
          throw new Error("Invalid plugin access response");
        }

        pluginAccess = json.data;

        return json.data;
      }

      saveSourcesButtonEl.addEventListener("click", function () {
        if (canUseProFeatures() !== true) {
          setStatus(
            "Global Source / Project Source の選択は Pro で利用できます。",
            true,
          );
          return;
        }
        var globalSources = collectCheckedSources("global-source-candidate");
        var projectSources = collectCheckedSources("project-source-candidate");

        console.log("[ui] save sources", {
          globalSources: globalSources,
          projectSources: projectSources,
        });

        sendToPlugin({
          type: "save-sources",
          globalSources: globalSources,
          projectSources: projectSources,
        });

        setStatus("Sources を保存しています...", false);
      });

      runButtonEl.addEventListener("click", () => {
        var baseUrl = getServerBaseUrl();

        setRunning(true);
        setStatus("lint を実行しています...", false);

        sendToPlugin({
          type: "run-lint",
          serverBaseUrl: baseUrl,
        });
      });
      connectButtonEl.addEventListener("click", () => {
        const baseUrl = getServerBaseUrl();

        console.log("[ui] connect click", {
          normalizedBaseUrl: baseUrl,
        });

        if (!baseUrl) {
          setStatus("Server Base URL を入力してください。", true);
          return;
        }

        if (isConnecting) {
          setStatus("接続処理中です。少し待ってください。", false);
          return;
        }

        const requestId = createRequestId();
        const authUrl =
          baseUrl +
          "/api/auth/start?requestId=" +
          encodeURIComponent(requestId);

        activeConnectRequestId = requestId;
        connectDeadlineAt = Date.now() + POLL_TIMEOUT_MS;

        clearConnectPolling();
        setConnecting(true);

        console.log("[ui] opening auth url", {
          authUrl: authUrl,
          requestId: requestId,
        });

        window.open(authUrl, "_blank", "width=520,height=720");
        setStatus(
          "ブラウザで OAuth を開始しました。完了を待っています...",
          false,
        );

        pollConnectResult(baseUrl, requestId);
      });

      setupPagesButtonEl.addEventListener("click", function () {
        setStatus("ページをセットアップしています...", false);

        sendToPlugin({
          type: "setup-pages",
        });
      });

      window.onmessage = (event) => {
        console.log("[plugin -> ui raw]", event.data);

        const msg = event.data.pluginMessage;
        if (!msg) return;

        console.log("[plugin -> ui]", msg);

        if (msg.type === "init") {
          console.log("[ui] init received", msg.config);
          console.log("[ui] init candidates", msg.candidates);

          currentCandidates = Array.isArray(msg.candidates)
            ? msg.candidates
            : [];

          sessionToken =
            typeof msg.sessionToken === "string" ? msg.sessionToken : "";

          renderSources(msg.config);
          renderSourceSelectors(msg.config, currentCandidates);
          updateRunLintAvailability(msg.config);
          refreshPluginAccess();
          return;
        }

        if (msg.type === "connection-status") {
          console.log("[ui] connection-status", msg.connected);
          connectionStatusEl.textContent = msg.connected
            ? "Connected"
            : "Not connected";

          if (msg.connected) {
            clearConnectPolling();
            setConnecting(false);
            setStatus("接続済みです。", false);
          }

          if (!msg.connected) {
            sessionToken = "";
            pluginAccess = null;
            updateSourceControlsDisabled();
          }

          return;
        }

        if (msg.type === "status") {
          console.log("[ui] status", msg.message);
          setStatus(msg.message, false);
          return;
        }

        if (msg.type === "result") {
          console.log("[ui] result", msg);
          setRunning(false);
          resultEl.textContent =
            "current page instances: " +
            msg.totalInstances +
            "\n" +
            "invalid: " +
            msg.invalidCount +
            "\n" +
            "markers: " +
            msg.markerCount;
          return;
        }

        if (msg.type === "setup-pages-result") {
          resultEl.textContent =
            "__test: " +
            (msg.testPageCreated ? "作成" : "既存") +
            "\n" +
            "__allowedComponentList: " +
            (msg.allowedPageCreated ? "作成" : "既存");
          return;
        }

        if (msg.type === "error") {
          console.log("[ui] error", msg.message);
          setRunning(false);
          setConnecting(false);
          clearConnectPolling();
          setStatus(msg.message, true);
          return;
        }
      };

      openSettingsButtonEl.addEventListener("click", function () {
        openSettingsModal();
      });

      closeSettingsButtonEl.addEventListener("click", function () {
        closeSettingsModal();
      });

      settingsBackdropEl.addEventListener("click", function () {
        closeSettingsModal();
      });

      window.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          closeSettingsModal();
        }
      });

      sendToPlugin({ type: "ui-ready" });
    </script>
  </body>
</html>
